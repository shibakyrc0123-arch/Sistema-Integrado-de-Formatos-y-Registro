{% if resultados %} 
    <div style="border: 1px solid #e2e8f0; border-radius: 8px; max-height: 140px; overflow-y: auto; margin-bottom: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
        
        <p style="padding: 6px 10px; margin: 0; background: #f1f5f9; font-size: 0.75em; color: #3a5693; font-weight: bold; text-align: left;">
            🔍 ÍTEMS SIMILARES ENCONTRADOS:
        </p>
        
        {% for item in resultados %}
            <div style="padding: 8px 10px; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; background: white;">
                
                <span style="font-size: 0.85em; color: #1e293b; text-transform: uppercase;">
                    <strong>{{ item.descripcion }}</strong> ({{ item.unidad_medida }})
                </span>
                
                <button type="button" 
                        hx-get="/solicitud/añadir-item-lista/{{ item.id }}/" 
                        hx-target="#lista-apilada-tabla" 
                        hx-swap="beforeend" 
                        style="background: #3a5693; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold;"
                        onclick="document.getElementById('mensaje-vacio').style.display='none'">
                    + Añadir
                </button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<div style="padding: 12px; border: 1px dashed #94a3b8; border-radius: 8px; background: #f8fafc; text-align: left;">
    
    <p style="color: #1e293b; margin: 0 0 10px 0; text-align: center; font-size: 0.85em;">
        {% if resultados %}
            <strong>¿No es ninguno de arriba?</strong> Créalo aquí:
        {% else %}
            <strong>"{{ query }}"</strong> no existe. <strong>¡Créalo ahora!</strong>
        {% endif %}
    </p>
    
    <form hx-post="/solicitud/crear-y-añadir/" hx-target="#lista-apilada-tabla" hx-swap="beforeend" style="margin: 0; display: flex; flex-direction: column; gap: 8px;">
        {% csrf_token %}
        
        <div style="display: flex; gap: 10px; align-items: flex-end;">
            
            <div style="flex: 2;">
                <label style="font-size: 0.75em; font-weight: bold; color: #64748b; display: block; margin-bottom: 3px;">Nombre Exacto:</label>
                <input type="text" name="nuevo_nombre" value="{{ query }}" required 
                       style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-transform: uppercase; outline: none; box-sizing: border-box; font-size: 0.85em; margin: 0; background: white;">
            </div>

            <div style="flex: 1;">
                <label style="font-size: 0.75em; font-weight: bold; color: #64748b; display: block; margin-bottom: 3px;">Unidad:</label>
                <select name="nueva_unidad" required 
                        style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; outline: none; cursor: pointer; box-sizing: border-box; font-size: 0.85em; margin: 0;">
                    <option value="UND">UND</option>
                    <option value="MTS">MTS</option>
                    <option value="GL">GL</option>
                    <option value="KIT">KIT</option>
                    <option value="GLB">GLB</option>
                    <option value="PAR">PAR</option>
                </select>
            </div>
        </div>

        <button type="submit" 
                style="background: #1e293b; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9em; margin-top: 5px;"
                onclick="document.getElementById('mensaje-vacio').style.display='none'">
            ✨ Guardar Nuevo Ítem
        </button>
    </form>
</div>
