<tr style="border-bottom: 1px solid #e2e8f0; animation: fadeIn 0.3s ease-in; background: white;">

    <td style="padding: 10px; vertical-align: middle;">
        <span style="font-weight: bold; color: #3a5693; text-transform: uppercase; font-size: 0.85em; display: block;">
            {{ item.descripcion }}
        </span>
        <input type="hidden" name="nombres_items[]" value="{{ item.descripcion }}">
        
        <input type="text" name="observaciones[]" placeholder="Añadir observación (Opcional)..." 
               style="width: 100%; padding: 4px 8px; margin-top: 5px; border: 1px dashed #cbd5e1; border-radius: 4px; font-size: 0.75em; color: #64748b; outline: none; background: #f8fafc;">
    </td>

    <td style="padding: 10px; text-align: center; vertical-align: middle;">
        <input type="number" name="cantidades[]" value="1" min="1" 
               style="width: 55px; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1; text-align: center; outline: none; font-size: 0.9em;">
    </td>

    <td style="padding: 10px; vertical-align: middle;">
        <select name="unidades[]" style="width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1; background: white; font-size: 0.85em; cursor: pointer; outline: none;">
            <option value="UND" {% if item.unidad_medida == 'UND' %}selected{% endif %}>UND</option>
            <option value="MTS" {% if item.unidad_medida == 'MTS' %}selected{% endif %}>MTS</option>
            <option value="GL" {% if item.unidad_medida == 'GL' %}selected{% endif %}>GL</option>
            <option value="KIT" {% if item.unidad_medida == 'KIT' %}selected{% endif %}>KIT</option>
            <option value="GLB" {% if item.unidad_medida == 'GLB' %}selected{% endif %}>GLB</option>
            <option value="PAR" {% if item.unidad_medida == 'PAR' %}selected{% endif %}>PAR</option>
        </select>
    </td>

    <td style="padding: 10px; text-align: center; vertical-align: middle;">
        <button type="button" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2em; font-weight: bold; padding: 0;" 
                onclick="this.closest('tr').remove();">
            ×
        </button>
    </td>
</tr>
